<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Pro</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/themes.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- 🔥 QRCode (IMPORTANTE - antes que tus scripts) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

    <!-- ⚙️ Config primero -->
    <script src="js/config.js" defer></script>
<script src="js/chat.js" defer></script>
<script src="js/calculator.js" defer></script>

</head>

<body>
    <!-- Loader -->
    <div id="loader" class="loader">
        <div class="loader-content">
            <div class="calc-icon">🔢</div>
            <div class="loader-text">Cargando...</div>
        </div>
    </div>

    <!-- Calculadora -->
    <div id="calculator" class="calculator theme-default">

        <!-- Temas -->
        <div class="theme-selector">
            <button class="theme-btn" data-theme="default">🎨</button>
            <button class="theme-btn" data-theme="dark">🌙</button>
            <button class="theme-btn" data-theme="neon">💫</button>
            <button class="theme-btn" data-theme="minimal">⬜</button>
            <button class="theme-btn" data-theme="retro">📺</button>
            <button class="theme-btn" data-theme="nature">🌿</button>
            <button class="theme-btn" data-theme="ocean">🌊</button>
            <button class="theme-btn" data-theme="sunset">🌅</button>
            <button class="theme-btn" data-theme="galaxy">🌌</button>
            <button class="theme-btn" data-theme="cyberpunk">🤖</button>
            <button class="theme-btn" data-theme="pastel">🍬</button>
            <button class="theme-btn" data-theme="glass">💎</button>
        </div>

        <!-- Display -->
        <div class="display-container">
            <div class="display-history" id="history"></div>
            <input type="text" id="display" class="display" readonly value="0">
            <div class="display-indicator">
                <span id="mode-indicator">BÁSICA</span>
                <button id="mode-toggle" class="mode-btn">SCI</button>
            </div>
        </div>

        <!-- Teclado -->
        <div id="basic-keypad" class="keypad">
            <div class="key-row">
                <button class="key key-function" data-action="clear">AC</button>
                <button class="key key-function" data-action="backspace">⌫</button>
                <button class="key key-function" data-action="percent">%</button>
                <button class="key key-operator" data-action="operator" data-value="/">÷</button>
            </div>

            <div class="key-row">
                <button class="key key-number" data-action="number" data-value="7">7</button>
                <button class="key key-number" data-action="number" data-value="8">8</button>
                <button class="key key-number" data-action="number" data-value="9">9</button>
                <button class="key key-operator" data-action="operator" data-value="*">×</button>
            </div>

            <div class="key-row">
                <button class="key key-number" data-action="number" data-value="4">4</button>
                <button class="key key-number" data-action="number" data-value="5">5</button>
                <button class="key key-number" data-action="number" data-value="6">6</button>
                <button class="key key-operator" data-action="operator" data-value="-">−</button>
            </div>

            <div class="key-row">
                <button class="key key-number" data-action="number" data-value="1">1</button>
                <button class="key key-number" data-action="number" data-value="2">2</button>
                <button class="key key-number" data-action="number" data-value="3">3</button>
                <button class="key key-operator" data-action="operator" data-value="+">+</button>
            </div>

            <div class="key-row">
                <button class="key key-number" data-action="negate">±</button>
                <button class="key key-number" data-action="number" data-value="0">0</button>
                <button class="key key-number" data-action="decimal">.</button>
                <button class="key key-equals" data-action="equals">=</button>
            </div>
        </div>

        <!-- Input secreto -->
        <input type="text" id="secret-input" class="secret-input" autocomplete="off">
    </div>

    <!-- MODAL -->
    <div id="secret-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔒 Canal Seguro Desbloqueado</h2>
                <button class="modal-close" id="close-modal">&times;</button>
            </div>

            <div class="modal-body">

                <!-- QR -->
                <div class="access-section">
                    <h3>📱 Móvil / Tablet</h3>
                    <canvas id="qr-code"></canvas>
                </div>

                <!-- Link -->
                <div class="access-section">
                    <h3>💻 PC / Desktop</h3>

                    <a id="chat-hyperlink" href="#" target="_blank">🔗 Abrir Chat Privado</a>

                    <input type="text" id="chat-link" readonly>
                    <button id="copy-link">📋 Copiar</button>
                </div>

                <button id="start-chat">🚀 Iniciar Chat</button>
            </div>
        </div>
    </div>

    <!-- CHAT -->
    <div id="chat-window" class="chat-window hidden">
        <div id="chat-messages"></div>

        <input type="text" id="message-input">
        <button id="send-message">➤</button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

</body>
</html>
